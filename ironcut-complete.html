<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#0c0d0f" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="IRONCUT" />
<title>IRONCUT — Strength Cut Tracker</title>
<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="./icon-180.png" />
<link rel="icon" href="./icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Archivo:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0d0f;
  --bg2:#131518;
  --panel:#16181c;
  --panel2:#1c1f24;
  --line:#26292f;
  --line2:#33373f;
  --txt:#eef1f4;
  --mut:#8b9099;
  --mut2:#5c616b;
  --acc:#caff3f;        /* acid lime */
  --acc-dim:#8aa82a;
  --warn:#ff8a3d;
  --bad:#ff5160;
  --good:#caff3f;
  --blue:#4dd0ff;
  --r:14px;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --disp:'Saira Condensed',sans-serif;
  --body:'Archivo',system-ui,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:var(--bg);
  color:var(--txt);
  font-family:var(--body);
  font-size:15px;line-height:1.4;
  overscroll-behavior-y:none;
  -webkit-font-smoothing:antialiased;
}
body::before{ /* subtle grid atmosphere */
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.5;
  background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
  background-size:34px 34px;mask-image:radial-gradient(circle at 50% 0%,#000 0%,transparent 70%);
  -webkit-mask-image:radial-gradient(circle at 50% 0%,#000 0%,transparent 70%);
}
#app{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:0 16px calc(96px + env(safe-area-inset-bottom)) 16px;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:var(--mono);}
.mono{font-family:var(--mono)}
.disp{font-family:var(--disp)}

/* Header */
header{position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;
  padding:calc(12px + env(safe-area-inset-top)) 2px 12px;background:linear-gradient(180deg,var(--bg) 60%,transparent);}
.brand{display:flex;align-items:center;gap:9px}
.brand .glyph{width:26px;height:26px}
.brand h1{font-family:var(--disp);font-weight:800;font-size:22px;letter-spacing:1.5px;margin:0;text-transform:uppercase}
.brand h1 b{color:var(--acc)}
.cyc{font-family:var(--mono);font-size:11px;color:var(--mut);border:1px solid var(--line);border-radius:999px;padding:5px 10px;letter-spacing:.5px}
.cyc b{color:var(--acc)}

h2.sect{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--mut2);margin:26px 4px 12px;display:flex;align-items:center;gap:10px}
h2.sect::after{content:"";flex:1;height:1px;background:var(--line)}

/* Cards & tiles */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:12px}
.tiles{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.tile{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:13px 14px;position:relative;overflow:hidden}
.tile .k{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mut2)}
.tile .v{font-family:var(--disp);font-weight:700;font-size:30px;line-height:1.05;margin-top:5px;letter-spacing:.5px}
.tile .u{font-size:13px;color:var(--mut);font-weight:600;font-family:var(--body)}
.tile .sub{font-family:var(--mono);font-size:10.5px;color:var(--mut);margin-top:3px}
.tile.accent .v{color:var(--acc)}
.tile.span2{grid-column:span 2}

/* Hero */
.hero{background:radial-gradient(120% 120% at 80% 0%,rgba(202,255,63,.10),transparent 55%),var(--panel);
  border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:12px;position:relative;overflow:hidden}
.hero .top{display:flex;justify-content:space-between;align-items:flex-end}
.hero .lab{font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mut2)}
.hero .bw{font-family:var(--disp);font-weight:800;font-size:64px;line-height:.85;letter-spacing:1px}
.hero .bw small{font-size:22px;color:var(--mut);font-weight:600}
.hero .delta{text-align:right;font-family:var(--mono);font-size:12px}
.hero .delta .big{font-family:var(--disp);font-size:30px;font-weight:700;color:var(--acc);line-height:1}
.prog{margin-top:16px}
.prog .bar{height:10px;border-radius:6px;background:var(--bg2);border:1px solid var(--line);overflow:hidden;position:relative}
.prog .fill{height:100%;background:linear-gradient(90deg,var(--acc-dim),var(--acc));border-radius:6px;transition:width .6s cubic-bezier(.2,.8,.2,1)}
.prog .ends{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--mut);margin-top:7px}
.prog .ends b{color:var(--txt)}

/* Buttons */
.btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:16px;border-radius:13px;
  font-family:var(--disp);font-weight:700;font-size:19px;letter-spacing:1px;text-transform:uppercase;
  background:var(--acc);color:#0a0c05;transition:transform .08s,filter .15s}
.btn:active{transform:scale(.985);filter:brightness(.94)}
.btn.ghost{background:var(--panel2);color:var(--txt);border:1px solid var(--line2)}
.btn.warn{background:var(--warn);color:#1a0d03}
.btn.sm{padding:11px;font-size:14px;border-radius:11px}
.btn.danger{background:transparent;border:1px solid var(--bad);color:var(--bad)}
.btnrow{display:flex;gap:10px}
.btnrow>*{flex:1}

/* Next workout card */
.nwk{background:linear-gradient(135deg,rgba(202,255,63,.08),transparent),var(--panel);border:1px solid var(--line2);border-radius:18px;padding:18px}
.nwk .tag{font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--acc);text-transform:uppercase}
.nwk .name{font-family:var(--disp);font-weight:800;font-size:40px;line-height:.95;margin:6px 0 2px;text-transform:uppercase;letter-spacing:1px}
.nwk .exlist{font-family:var(--mono);font-size:12px;color:var(--mut);margin:8px 0 16px;line-height:1.7}

/* Exercise logging */
.ex{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);margin-bottom:11px;overflow:hidden}
.ex .head{display:flex;justify-content:space-between;align-items:center;padding:14px 15px;gap:10px}
.ex .head .nm{font-family:var(--disp);font-weight:700;font-size:21px;letter-spacing:.5px}
.ex .head .meta{font-family:var(--mono);font-size:10.5px;color:var(--mut);margin-top:2px}
.ex .head .sug{font-family:var(--mono);font-size:11px;color:var(--acc);text-align:right;white-space:nowrap}
.ex .head .sug small{color:var(--mut2);display:block;font-size:9px;letter-spacing:1px}
.ex .body{padding:0 15px 14px;display:none}
.ex.open .body{display:block}
.ex .chev{color:var(--mut2);transition:transform .2s;font-size:20px;line-height:1}
.ex.open .chev{transform:rotate(180deg)}
.last{font-family:var(--mono);font-size:11px;color:var(--mut2);background:var(--bg2);border:1px solid var(--line);border-radius:9px;padding:8px 11px;margin-bottom:11px}
.last b{color:var(--mut)}
.setrow{display:grid;grid-template-columns:30px 1fr 1fr 34px;gap:8px;align-items:center;margin-bottom:8px}
.setrow .idx{font-family:var(--mono);font-size:12px;color:var(--mut2);text-align:center}
.fieldwrap{position:relative}
.fieldwrap label{position:absolute;top:5px;left:10px;font-family:var(--mono);font-size:8px;letter-spacing:1px;color:var(--mut2);text-transform:uppercase}
.setrow input{width:100%;background:var(--bg2);border:1px solid var(--line2);border-radius:10px;color:var(--txt);
  font-size:18px;font-weight:600;padding:18px 8px 7px;text-align:center}
.setrow input:focus{outline:none;border-color:var(--acc)}
.setrow .done{width:34px;height:46px;border-radius:10px;background:var(--bg2);border:1px solid var(--line2);color:var(--mut2);font-size:18px;display:flex;align-items:center;justify-content:center}
.setrow .done.on{background:var(--acc);color:#0a0c05;border-color:var(--acc)}
.ex .tools{display:flex;gap:8px;margin-top:6px}
.ex .tools button{flex:1;font-family:var(--mono);font-size:11px;color:var(--mut);background:var(--bg2);border:1px solid var(--line);border-radius:9px;padding:9px;letter-spacing:.5px}
.notesin{width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:9px;color:var(--txt);
  font-family:var(--body);font-size:13px;padding:9px 11px;margin-top:9px;resize:none}
.notesin:focus{outline:none;border-color:var(--line2)}

/* Weigh */
.bigin{display:flex;align-items:baseline;justify-content:center;gap:8px;margin:6px 0 4px}
.bigin input{width:190px;background:transparent;border:none;border-bottom:2px solid var(--line2);
  font-family:var(--disp);font-weight:800;font-size:62px;text-align:center;color:var(--txt);padding:0 0 4px}
.bigin input:focus{outline:none;border-color:var(--acc)}
.bigin .u{font-family:var(--disp);font-size:26px;color:var(--mut)}

/* Chart */
.chartwrap{margin-top:6px}
canvas{width:100%;display:block;border-radius:8px}
.legend{display:flex;gap:16px;flex-wrap:wrap;font-family:var(--mono);font-size:11px;color:var(--mut);margin-top:10px}
.legend i{display:inline-block;width:18px;height:3px;border-radius:2px;margin-right:6px;vertical-align:middle}
.seg{display:flex;gap:6px;background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:4px;margin-bottom:12px}
.seg button{flex:1;font-family:var(--mono);font-size:11px;letter-spacing:.5px;color:var(--mut);padding:9px 6px;border-radius:8px}
.seg button.on{background:var(--panel2);color:var(--acc);border:1px solid var(--line2)}

/* PR list */
.pr{display:flex;justify-content:space-between;align-items:center;padding:11px 2px;border-bottom:1px solid var(--line)}
.pr:last-child{border-bottom:none}
.pr .nm{font-family:var(--body);font-size:14px;font-weight:500}
.pr .v{font-family:var(--mono);font-size:13px;color:var(--acc);text-align:right}
.pr .v small{color:var(--mut2);font-size:10px;display:block}

/* Timer */
.timer{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px;text-align:center}
.timer .disp{font-family:var(--disp);font-weight:800;font-size:58px;letter-spacing:2px;line-height:1}
.timer.run .disp{color:var(--acc)}
.chips{display:flex;gap:8px;margin:12px 0}
.chips button{flex:1;font-family:var(--mono);font-size:13px;color:var(--txt);background:var(--bg2);border:1px solid var(--line2);border-radius:10px;padding:12px 4px}
.chips button:active{background:var(--panel2)}

/* Banner */
.banner{display:flex;gap:12px;align-items:flex-start;border-radius:var(--r);padding:14px 15px;margin-bottom:12px;font-size:13.5px}
.banner.rest{background:rgba(77,208,255,.08);border:1px solid rgba(77,208,255,.3)}
.banner.warn{background:rgba(255,138,61,.09);border:1px solid rgba(255,138,61,.35)}
.banner .ic{font-size:20px;line-height:1}
.banner b{font-family:var(--disp);font-size:16px;letter-spacing:.5px;display:block;margin-bottom:2px}
.banner.warn b{color:var(--warn)} .banner.rest b{color:var(--blue)}

/* Nav */
nav{position:fixed;bottom:0;left:0;right:0;z-index:40;display:flex;justify-content:center;
  background:linear-gradient(0deg,var(--bg) 55%,transparent);padding:8px 12px calc(8px + env(safe-area-inset-bottom))}
.navinner{display:flex;width:100%;max-width:560px;background:var(--panel);border:1px solid var(--line2);border-radius:16px;padding:6px;gap:2px;box-shadow:0 -6px 24px rgba(0,0,0,.4)}
.navinner button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 2px;border-radius:11px;color:var(--mut2);font-family:var(--mono);font-size:9.5px;letter-spacing:.5px;text-transform:uppercase}
.navinner button svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.8}
.navinner button.on{color:var(--acc);background:var(--panel2)}

/* Modal */
.modal{position:fixed;inset:0;z-index:60;background:rgba(6,7,8,.78);backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center}
.modal.show{display:flex}
.sheet{width:100%;max-width:560px;background:var(--bg2);border:1px solid var(--line2);border-radius:20px 20px 0 0;padding:22px 18px calc(26px + env(safe-area-inset-bottom));animation:up .25s cubic-bezier(.2,.8,.2,1)}
@keyframes up{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}
.sheet h3{font-family:var(--disp);font-weight:800;font-size:26px;margin:0 0 4px;letter-spacing:.5px;text-transform:uppercase}
.sheet p.s{color:var(--mut);font-size:13px;margin:0 0 18px}
.field{margin-bottom:14px}
.field label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mut2);margin-bottom:6px}
.field input{width:100%;background:var(--panel);border:1px solid var(--line2);border-radius:11px;color:var(--txt);font-size:17px;font-weight:600;padding:13px 14px}
.field input:focus{outline:none;border-color:var(--acc)}
.field .row{display:flex;gap:10px}.field .row>*{flex:1}

.empty{text-align:center;color:var(--mut2);font-family:var(--mono);font-size:12px;padding:30px 10px;line-height:1.7}
.toast{position:fixed;bottom:calc(96px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--acc);color:#0a0c05;font-family:var(--disp);font-weight:700;font-size:15px;letter-spacing:.5px;
  padding:11px 20px;border-radius:999px;z-index:70;opacity:0;transition:.25s;pointer-events:none;text-transform:uppercase}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.fade{animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.hide{display:none!important}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand">
      <svg class="glyph" viewBox="0 0 24 24" fill="none"><rect x="1" y="9" width="3" height="6" rx="1" fill="#caff3f"/><rect x="4" y="7" width="2.5" height="10" rx="1" fill="#caff3f"/><rect x="20" y="9" width="3" height="6" rx="1" fill="#caff3f"/><rect x="17.5" y="7" width="2.5" height="10" rx="1" fill="#caff3f"/><rect x="6" y="11" width="12" height="2" rx="1" fill="#eef1f4"/></svg>
      <h1>IRON<b>CUT</b></h1>
    </div>
    <div class="cyc" id="cycBadge">CYCLE <b>A</b></div>
  </header>
  <main id="view"></main>
</div>

<nav>
  <div class="navinner" id="nav">
    <button data-tab="home" class="on"><svg viewBox="0 0 24 24"><path d="M3 10l9-7 9 7v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 21v-6h6v6"/></svg>Home</button>
    <button data-tab="train"><svg viewBox="0 0 24 24"><path d="M6.5 6.5l11 11M4 9l-1.5 1.5 3 3M20 15l1.5-1.5-3-3M9 4l1.5-1.5 3 3M15 20l-1.5 1.5-3-3"/></svg>Train</button>
    <button data-tab="weigh"><svg viewBox="0 0 24 24"><circle cx="12" cy="13" r="8"/><path d="M12 13l3-4M9 2h6"/></svg>Weigh</button>
    <button data-tab="progress"><svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 14l3-4 4 3 5-7"/></svg>Stats</button>
    <button data-tab="data"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.6-2-3.4-2.4 1a7 7 0 0 0-1.7-1l-.3-2.5h-4l-.3 2.5a7 7 0 0 0-1.7 1l-2.4-1-2 3.4 2 1.6a7 7 0 0 0 0 2l-2 1.6 2 3.4 2.4-1a7 7 0 0 0 1.7 1l.3 2.5h4l.3-2.5a7 7 0 0 0 1.7-1l2.4 1 2-3.4-2-1.6c.1-.3.1-.7.1-1z"/></svg>Data</button>
  </div>
</nav>

<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* ============================ EXERCISE DATABASE ============================ */
// mode: 'weight' (load on bar/db), 'bw' (bodyweight reps, weight field = added lb), 'time' (reps field = seconds)
// p:true => primary lift (auto-progression + counts toward strength score key lifts handled separately)
const DB = {
  "Push A":[
    {n:"DB Bench Press",p:1,sets:4,reps:5,inc:5,mode:"weight"},
    {n:"Seated DB Shoulder Press",sets:3,reps:8,inc:5,mode:"weight"},
    {n:"Incline DB Press",sets:3,reps:8,inc:5,mode:"weight"},
    {n:"Lateral Raise",sets:3,reps:12,inc:5,mode:"weight"},
    {n:"Triceps Pushdown",sets:3,reps:12,inc:5,mode:"weight"},
  ],
  "Pull A":[
    {n:"Chest Supported Row",p:1,sets:4,reps:6,inc:5,mode:"weight"},
    {n:"Lat Pulldown",sets:3,reps:10,inc:5,mode:"weight"},
    {n:"One Arm DB Row",sets:3,reps:8,inc:5,mode:"weight"},
    {n:"Face Pull",sets:3,reps:15,inc:5,mode:"weight"},
    {n:"Hammer Curl",sets:3,reps:10,inc:5,mode:"weight"},
  ],
  "Legs A":[
    {n:"Back Squat",p:1,sets:4,reps:5,inc:10,mode:"weight"},
    {n:"Romanian Deadlift",p:1,sets:3,reps:6,inc:10,mode:"weight"},
    {n:"Walking Lunges",sets:3,reps:10,inc:5,mode:"weight"},
    {n:"Leg Curl",sets:3,reps:12,inc:5,mode:"weight"},
    {n:"Ab Wheel",sets:3,reps:10,inc:0,mode:"bw"},
  ],
  "Push B":[
    {n:"Seated DB Shoulder Press",p:1,sets:4,reps:6,inc:5,mode:"weight"},
    {n:"Incline DB Press",sets:3,reps:8,inc:5,mode:"weight"},
    {n:"Machine Chest Press",sets:3,reps:10,inc:5,mode:"weight"},
    {n:"Lateral Raise",sets:3,reps:12,inc:5,mode:"weight"},
    {n:"Overhead Rope Extension",sets:3,reps:12,inc:5,mode:"weight"},
  ],
  "Pull B":[
    {n:"Pull-Ups",p:1,sets:4,reps:6,inc:5,mode:"bw"},
    {n:"Chest Supported Row",sets:3,reps:8,inc:5,mode:"weight"},
    {n:"Neutral Grip Pulldown",sets:3,reps:10,inc:5,mode:"weight"},
    {n:"Rear Delt Fly",sets:3,reps:15,inc:5,mode:"weight"},
    {n:"EZ Curl",sets:3,reps:10,inc:5,mode:"weight"},
  ],
  "Legs B":[
    {n:"Deadlift",p:1,sets:3,reps:4,inc:10,mode:"weight"},
    {n:"Front Squat",p:1,sets:3,reps:5,inc:10,mode:"weight"},
    {n:"Bulgarian Split Squat",sets:3,reps:8,inc:5,mode:"weight"},
    {n:"Leg Curl",sets:3,reps:12,inc:5,mode:"weight"},
    {n:"Plank",sets:3,reps:45,inc:0,mode:"time"},
  ],
  "Push C":[
    {n:"DB Bench Press",p:1,sets:4,reps:5,inc:5,mode:"weight"},
    {n:"Incline DB Press",sets:3,reps:8,inc:5,mode:"weight"},
    {n:"Machine Shoulder Press",sets:3,reps:10,inc:5,mode:"weight"},
    {n:"Cable Lateral Raise",sets:3,reps:15,inc:5,mode:"weight"},
    {n:"Triceps Pushdown",sets:3,reps:12,inc:5,mode:"weight"},
  ],
  "Pull C":[
    {n:"T-Bar Row",p:1,sets:4,reps:6,inc:5,mode:"weight"},
    {n:"Pull-Ups/Pulldown",sets:3,reps:8,inc:5,mode:"weight"},
    {n:"Seated Cable Row",sets:3,reps:10,inc:5,mode:"weight"},
    {n:"Face Pull",sets:3,reps:15,inc:5,mode:"weight"},
    {n:"Hammer Curl",sets:3,reps:10,inc:5,mode:"weight"},
  ],
  "Legs C":[
    {n:"Safety Bar Squat",p:1,sets:4,reps:5,inc:10,mode:"weight"},
    {n:"Romanian Deadlift",p:1,sets:3,reps:6,inc:10,mode:"weight"},
    {n:"Leg Press",sets:3,reps:10,inc:10,mode:"weight"},
    {n:"Leg Curl",sets:3,reps:12,inc:5,mode:"weight"},
    {n:"Hanging Knee Raise",sets:3,reps:12,inc:0,mode:"bw"},
  ],
};
const ROTATION=["Push A","Pull A","Legs A","Rest","Push B","Pull B","Legs B","Rest","Push C","Pull C","Legs C","Rest"];
const KEY_LIFTS=["Back Squat","Deadlift","DB Bench Press","Seated DB Shoulder Press","Chest Supported Row","Front Squat","Safety Bar Squat","T-Bar Row"];

/* ============================ STATE ============================ */
const SKEY="ironcut_state_v1";
function defaultState(){return{
  profile:{startWeight:245,goalWeight:200,heightIn:74,rate:1.0},
  rotationIndex:0, weights:[], workouts:[], prog:{}, onboarded:false
};}
let S=defaultState();
try{const raw=localStorage.getItem(SKEY);if(raw)S=Object.assign(defaultState(),JSON.parse(raw));}catch(e){}
function save(){try{localStorage.setItem(SKEY,JSON.stringify(S));}catch(e){}}

/* ============================ HELPERS ============================ */
const $=s=>document.querySelector(s);
const today=()=>new Date().toISOString().slice(0,10);
const fmt=(n,d=1)=>n==null||isNaN(n)?"—":(+n).toFixed(d).replace(/\.0$/,"");
const round5=n=>Math.round(n/5)*5;
function e1rm(w,r){return w<=0?0:w*(1+r/30);} // Epley
function lbsLost(){const c=currentBW();return c==null?0:S.profile.startWeight-c;}
function latestWeight(){return S.weights.length?S.weights[S.weights.length-1].w:null;}
function currentBW(){ // 7-day trend value if available, else latest, else start
  if(!S.weights.length) return S.profile.startWeight;
  const sorted=[...S.weights].sort((a,b)=>a.d<b.d?-1:1);
  const last=sorted[sorted.length-1];
  const cutoff=new Date(last.d); cutoff.setDate(cutoff.getDate()-6);
  const win=sorted.filter(x=>new Date(x.d)>=cutoff);
  if(win.length>=3) return win.reduce((s,x)=>s+x.w,0)/win.length;
  return last.w;
}
function bwOn(dateStr){ // nearest weigh-in on/before date
  const before=S.weights.filter(x=>x.d<=dateStr).sort((a,b)=>a.d<b.d?1:-1);
  if(before[0])return before[0].w;
  return latestWeight()||S.profile.startWeight;
}
function lossRate(){ // lb/week via linear regression on recent weigh-ins
  if(S.weights.length<2)return null;
  const sorted=[...S.weights].sort((a,b)=>a.d<b.d?-1:1);
  const recent=sorted.slice(-21);
  if(recent.length<2)return null;
  const t0=new Date(recent[0].d).getTime();
  const xs=recent.map(p=>(new Date(p.d).getTime()-t0)/86400000);
  const ys=recent.map(p=>p.w);
  const span=xs[xs.length-1]-xs[0];
  if(span<3)return null;
  const n=xs.length, sx=xs.reduce((a,b)=>a+b,0), sy=ys.reduce((a,b)=>a+b,0);
  const sxy=xs.reduce((a,x,i)=>a+x*ys[i],0), sxx=xs.reduce((a,x)=>a+x*x,0);
  const slope=(n*sxy-sx*sy)/(n*sxx-sx*sx); // lb/day
  return slope*7; // lb/week (negative = losing)
}
function goalDate(){
  const r=lossRate(); const c=currentBW();
  if(r==null||c==null||r>=-0.05)return null;
  const weeks=(c-S.profile.goalWeight)/(-r);
  if(weeks<=0)return "Reached";
  const d=new Date(); d.setDate(d.getDate()+Math.round(weeks*7));
  return d.toLocaleDateString(undefined,{month:"long",year:"numeric"});
}
function bestE1RM(name){
  let best=0;
  S.workouts.forEach(w=>w.ex.forEach(e=>{if(e.name===name)e.sets.forEach(s=>{const v=e1rm(s.w,s.r);if(v>best)best=v;});}));
  return best;
}
function strengthScore(bw){ // composite relative strength
  const total=KEY_LIFTS.reduce((a,n)=>a+bestE1RM(n),0);
  return bw>0?total/bw:0;
}
function nextWorkout(){ // skip Rest slots; returns {idx,type}
  let i=S.rotationIndex;
  for(let k=0;k<12;k++){const slot=ROTATION[i];if(slot!=="Rest")return{idx:i,type:slot};i=(i+1)%12;}
  return{idx:0,type:"Push A"};
}
function cycleLetter(){const nw=nextWorkout();return nw.type.slice(-1);}
function streak(){ // consecutive days (up to today) with a workout or weigh-in
  const days=new Set([...S.weights.map(w=>w.d),...S.workouts.map(w=>w.d)]);
  if(!days.has(today())&&!days.has(yday(0)))return 0;
  let n=0,cur=new Date();
  for(let k=0;k<400;k++){const ds=cur.toISOString().slice(0,10);if(days.has(ds)){n++;cur.setDate(cur.getDate()-1);}else if(k===0&&ds===today()){cur.setDate(cur.getDate()-1);}else break;}
  return n;
}
function yday(n){const d=new Date();d.setDate(d.getDate()-n);return d.toISOString().slice(0,10);}
function deloadNeeded(){
  let regress=0;
  for(const k in S.prog){if(S.prog[k].fail>=2)regress++;}
  return regress>=2;
}
function suggestedFor(ex){
  const pr=S.prog[ex.n];
  if(!pr||pr.sw==null)return null;
  return pr.sw;
}

  ${restNow?`<div class="banner rest"><div class="ic">◴</div><div><b>Rest Day</b>You've finished a cycle block. Recover — your next session is queued below whenever you're ready.</div></div>`:""}

function relDate(d){
  const diff=Math.round((new Date(today())-new Date(d))/86400000);
  if(diff<=0)return"today";if(diff===1)return"yesterday";if(diff<7)return diff+" days ago";
  return new Date(d).toLocaleDateString(undefined,{month:"short",day:"numeric"});
}

function fmtSet(e,s){

function setRow(e,i,j,s){

function fillSuggested(i){const e=DB[activeLog.type][i];const sug=suggestedFor(e);activeLog.sets[i].forEach(s=>{if(sug!=null)s.w=sug;s.r=e.reps;});render();keepTrainTab();}
function keepTrainTab(){document.querySelectorAll("#nav button").forEach(b=>b.classList.toggle("on",b.dataset.tab==="train"));}
function cancelLog(){activeLog=null;render();keepTrainTab();}

function completeWorkout(){
  const exs=DB[activeLog.type];
  const rec={id:Date.now(),d:today(),type:activeLog.type,ex:[]};
  exs.forEach((e,i)=>{
    const sets=activeLog.sets[i]
      .map(s=>({w:e.mode==="time"?0:(+s.w||0),r:+s.r||0}))
      .filter(s=>(s.r>0)||(s.w>0));
    rec.ex.push({name:e.n,mode:e.mode,sets,notes:activeLog.notes[i]||""});
    if(sets.length)updateProgression(e,sets);
  });
  if(!rec.ex.some(x=>x.sets.length)){toast("Log at least one set");return;}
  S.workouts.push(rec);
  S.rotationIndex=(activeLog.idx+1)%12; // advance past trained slot (auto-skips rest next time)
  save();activeLog=null;
  setTab("home");
  toast("Workout saved ✓");
}
// Progression engine
function updateProgression(e,sets){
  const sessionWeight = e.mode==="time"?0 : Math.min(...sets.map(s=>s.w));
  const targetMet = sets.filter(s=> e.mode==="time"? s.r>=e.reps : s.r>=e.reps ).length;
  const pr = S.prog[e.n] || {sw:null,succ:0,fail:0,last:null};
  // success = enough sets hit target reps, and (for weighted) weight >= current suggested
  const wOK = (e.mode==="time"||e.mode==="bw") ? true : (pr.sw==null || sessionWeight>=pr.sw);
  const success = targetMet>=e.sets && wOK;
  if(e.p){ // auto-progression only drives primary lifts; accessories track suggestion off last weight
    if(success){
      pr.fail=0; pr.succ=(pr.succ||0)+1;
      if(pr.succ>=2){
        pr.sw = e.mode==="bw" ? sessionWeight + e.inc : round5(sessionWeight + e.inc);
        if(e.mode==="bw" && e.inc===0) pr.sw=sessionWeight; // pure bodyweight: hold, progress reps
        pr.succ=0;
      } else {
        pr.sw = e.mode==="bw"? sessionWeight : (sessionWeight || pr.sw);
      }
    } else {
      pr.succ=0; pr.fail=(pr.fail||0)+1;
      if(pr.fail>=3 && e.mode==="weight"){ pr.sw=round5(sessionWeight*0.9); pr.fail=0; pr.deloaded=true; }
      else { pr.sw = sessionWeight || pr.sw; }
    }
  } else {
    // accessory: suggest last weight; nudge up only if every set beat target by 2+
    const crushed = sets.every(s=> e.mode==="time"? s.r>=e.reps+10 : s.r>=e.reps+2 );
    pr.sw = e.mode==="time"?0:(sessionWeight||pr.sw);
    if(crushed && e.mode==="weight") pr.sw=round5(sessionWeight+e.inc);
  }
  pr.last=sets;
  S.prog[e.n]=pr;
}

function avgWindow(sorted,days){

/* ============================ PROGRESS ============================ */
let progChart="weight";
function viewProgress(){
  const c=currentBW();
  const prs=KEY_LIFTS.map(n=>({n,e:bestE1RM(n)})).filter(x=>x.e>0).sort((a,b)=>b.e-a.e);
  return `
  <h2 class="sect">Trends</h2>

    <button data-c="weight" class="${progChart==="weight"?"on":""}" onclick="setProgChart('weight')">Weight</button>
    <button data-c="strength" class="${progChart==="strength"?"on":""}" onclick="setProgChart('strength')">Strength/BW</button>
    <button data-c="e1rm" class="${progChart==="e1rm"?"on":""}" onclick="setProgChart('e1rm')">Est 1RM</button>
  </div>
  <div class="card chartwrap">${chartCardBody()}</div>

  <h2 class="sect">Overview</h2>
  <div class="tiles">
    <div class="tile accent"><div class="k">Strength / Weight</div><div class="v">${fmt(strengthScore(c),2)}<span class="u">×</span></div></div>
    <div class="tile"><div class="k">Streak</div><div class="v">${streak()}<span class="u">days</span></div></div>
    <div class="tile"><div class="k">Total Workouts</div><div class="v">${S.workouts.length}</div></div>
    <div class="tile"><div class="k">Training Cycle</div><div class="v">${cycleLetter()}</div><div class="sub">next: ${nextWorkout().type}</div></div>
  </div>

  <h2 class="sect">Personal Records</h2>
  <div class="card">
    ${prs.length?prs.map(p=>{
      const{w,r}=bestSetFor(p.n);
      return `<div class="pr"><div><div class="nm">${p.n}</div></div><div class="v">${fmt(p.e,0)} <span style="color:var(--mut2)">e1RM</span><small>best set ${w}×${r}</small></div></div>`;
    }).join(""):`<div class="empty">No lifts logged yet.<br>Your PRs will appear here automatically.</div>`}
  </div>`;
}
function chartCardBody(){
  if(progChart==="weight"&&S.weights.length<2)return `<div class="empty">Need at least 2 weigh-ins.</div>`;
  if(progChart!=="weight"&&S.workouts.length<2)return `<div class="empty">Need at least 2 logged workouts.</div>`;
  let legend="";
  if(progChart==="weight")legend=`<span><i style="background:var(--mut2)"></i>Daily</span><span><i style="background:var(--acc)"></i>Trend</span>`;
  if(progChart==="strength")legend=`<span><i style="background:var(--acc)"></i>Strength ÷ bodyweight</span>`;
  if(progChart==="e1rm")legend=`<span><i style="background:var(--acc)"></i>Best e1RM / session (key lifts)</span>`;
  return `<canvas id="pChart" height="210"></canvas><div class="legend">${legend}</div>`;
}
function bestSetFor(name){let best=0,res={w:0,r:0};S.workouts.forEach(w=>w.ex.forEach(e=>{if(e.name===name)e.sets.forEach(s=>{const v=e1rm(s.w,s.r);if(v>best){best=v;res={w:s.w,r:s.r};}});}));return res;}
function setProgChart(c){progChart=c;render();keepTab("progress");}

/* ============================ DATA / SETTINGS ============================ */
function viewData(){
  return `
  <h2 class="sect">Goal & Profile</h2>
  <div class="card">
    <div class="field"><label>Start Weight (lb)</label><input id="pStart" inputmode="decimal" value="${S.profile.startWeight}"></div>
    <div class="field"><label>Goal Weight (lb)</label><input id="pGoal" inputmode="decimal" value="${S.profile.goalWeight}"></div>
    <div class="field"><label>Height (inches)</label><input id="pHt" inputmode="numeric" value="${S.profile.heightIn}"></div>
    <button class="btn sm" onclick="saveProfile()">Save Profile</button>
  </div>

  <h2 class="sect">Backup</h2>
  <div class="card">
    <p style="color:var(--mut);font-size:13px;margin:0 0 14px">Export everything — workouts, weigh-ins, PRs and progression — to a file you can keep or move to a new device.</p>
    <div class="btnrow">
      <button class="btn ghost sm" onclick="exportData()">⤓ Export</button>
      <button class="btn ghost sm" onclick="document.getElementById('importFile').click()">⤒ Import</button>
    </div>
    <input type="file" id="importFile" accept="application/json" class="hide" onchange="importData(event)">
  </div>

  <h2 class="sect">Rotation</h2>
  <div class="card" style="font-family:var(--mono);font-size:12px;color:var(--mut);line-height:2">
    ${ROTATION.map((s,i)=>`<div style="display:flex;justify-content:space-between"><span style="color:${i===S.rotationIndex?'var(--acc)':'inherit'}">${i===S.rotationIndex?'▸ ':'  '}${s}</span>${i===S.rotationIndex?'<span style="color:var(--acc)">current</span>':''}</div>`).join("")}
    <div class="btnrow" style="margin-top:14px">
      <button class="btn ghost sm" onclick="advanceRotation(-1)">◂ Back</button>
      <button class="btn ghost sm" onclick="advanceRotation(1)">Skip ▸</button>
    </div>
  </div>

  <h2 class="sect">Danger Zone</h2>
  <div class="card">
    <button class="btn danger sm" onclick="resetAll()">Erase All Data</button>
  </div>
  <div style="text-align:center;font-family:var(--mono);font-size:10px;color:var(--mut2);margin-top:18px">IRONCUT · offline-first · v1</div>`;
}
function saveProfile(){
  S.profile.startWeight=parseFloat($("#pStart").value)||S.profile.startWeight;
  S.profile.goalWeight=parseFloat($("#pGoal").value)||S.profile.goalWeight;
  S.profile.heightIn=parseFloat($("#pHt").value)||S.profile.heightIn;
  save();render();keepTab("data");toast("Profile saved ✓");
}
function advanceRotation(d){S.rotationIndex=(S.rotationIndex+d+12)%12;save();render();keepTab("data");}
function exportData(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="ironcut-backup-"+today()+".json";a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);toast("Exported ✓");
}
function importData(ev){
  const f=ev.target.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{try{const d=JSON.parse(rd.result);if(!d.profile)throw 0;S=Object.assign(defaultState(),d);save();render();keepTab("data");toast("Imported ✓");}catch(e){toast("Invalid backup file");}};
  rd.readAsText(f);
}
function resetAll(){
  openSheet(`<h3>Erase Everything?</h3><p class="s">This permanently deletes all workouts, weigh-ins and settings on this device. Export a backup first if unsure.</p>
  <div class="btnrow"><button class="btn ghost sm" onclick="closeSheet()">Cancel</button><button class="btn danger sm" onclick="doReset()">Erase</button></div>`);
}
function doReset(){localStorage.removeItem(SKEY);S=defaultState();closeSheet();setTab("home");toast("Data erased");}

/* ============================ ONBOARDING / SHEET ============================ */
function openOnboard(){
  openSheet(`<h3>Welcome to Ironcut</h3><p class="s">Two numbers and you're training. Strength-first, built to cut.</p>
  <div class="field"><label>Current / Start Weight (lb)</label><input id="oStart" inputmode="decimal" value="${S.profile.startWeight}"></div>
  <div class="field"><div class="row">
    <div><label>Goal Weight</label><input id="oGoal" inputmode="decimal" value="${S.profile.goalWeight}"></div>
    <div><label>Height (in)</label><input id="oHt" inputmode="numeric" value="${S.profile.heightIn}"></div>
  </div></div>
  <button class="btn" onclick="finishOnboard()">Start Lifting</button>`,true);
}
function finishOnboard(){
  S.profile.startWeight=parseFloat($("#oStart").value)||245;
  S.profile.goalWeight=parseFloat($("#oGoal").value)||200;
  S.profile.heightIn=parseFloat($("#oHt").value)||74;
  S.onboarded=true;save();closeSheet();render();
}
function openSheet(html,locked){const m=$("#modal");$("#sheet").innerHTML=html;m.classList.add("show");m.dataset.locked=locked?"1":"";}
function closeSheet(){$("#modal").classList.remove("show");}
$("#modal").addEventListener("click",e=>{if(e.target.id==="modal"&&$("#modal").dataset.locked!=="1")closeSheet();});

/* ============================ TOAST ============================ */
let toastT=null;
function toast(msg){const t=$("#toast");t.textContent=msg;t.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),1800);}

/* ============================ CHARTS (canvas) ============================ */
function drawLine(canvas,series,opts){
  opts=opts||{};
  const dpr=window.devicePixelRatio||1;
  const W=canvas.clientWidth, H=parseInt(canvas.getAttribute("height"))||200;
  canvas.width=W*dpr;canvas.height=H*dpr;
  const ctx=canvas.getContext("2d");ctx.scale(dpr,dpr);
  const padL=42,padR=12,padT=14,padB=24;
  const allX=[],allY=[];series.forEach(s=>s.points.forEach(p=>{allX.push(p.x);allY.push(p.y);}));
  if(!allY.length)return;
  let minX=Math.min(...allX),maxX=Math.max(...allX);
  let minY=Math.min(...allY),maxY=Math.max(...allY);
  const padY=(maxY-minY)*0.12||1;minY-=padY;maxY+=padY;
  if(minX===maxX)maxX=minX+1;
  const sx=x=>padL+((x-minX)/(maxX-minX))*(W-padL-padR);
  const sy=y=>padT+(1-(y-minY)/(maxY-minY))*(H-padT-padB);
  // grid + y labels
  ctx.font="9px 'JetBrains Mono',monospace";ctx.fillStyle="#5c616b";ctx.strokeStyle="#26292f";ctx.lineWidth=1;
  for(let i=0;i<=4;i++){const yv=minY+(maxY-minY)*i/4;const yy=sy(yv);
    ctx.beginPath();ctx.moveTo(padL,yy);ctx.lineTo(W-padR,yy);ctx.stroke();
    ctx.fillText((opts.yfmt?opts.yfmt(yv):yv.toFixed(0)),4,yy+3);}
  // x labels (first/last)
  if(opts.xlabels){ctx.textAlign="center";
    ctx.fillText(opts.xlabels[0],sx(minX)+8,H-7);
    ctx.fillText(opts.xlabels[1],sx(maxX)-8,H-7);ctx.textAlign="left";}
  // series
  series.forEach(s=>{
    if(s.points.length<1)return;
    ctx.strokeStyle=s.color;ctx.lineWidth=s.width||2;ctx.lineJoin="round";
    if(s.dots){ctx.fillStyle=s.color;s.points.forEach(p=>{ctx.beginPath();ctx.arc(sx(p.x),sy(p.y),2.4,0,7);ctx.fill();});}
    if(s.points.length>1){ctx.beginPath();s.points.forEach((p,i)=>{const X=sx(p.x),Y=sy(p.y);i?ctx.lineTo(X,Y):ctx.moveTo(X,Y);});ctx.stroke();}
    if(s.fill){const last=s.points[s.points.length-1];ctx.lineTo(sx(last.x),sy(minY));ctx.lineTo(sx(s.points[0].x),sy(minY));ctx.closePath();
      const g=ctx.createLinearGradient(0,padT,0,H-padB);g.addColorStop(0,s.fill);g.addColorStop(1,"transparent");ctx.fillStyle=g;ctx.fill();}
  });
}
function trendSeries(sorted){ // 7-day moving average for weight
  return sorted.map((p,i)=>{
    const cut=new Date(p.d);cut.setDate(cut.getDate()-6);
    const win=sorted.filter(x=>new Date(x.d)>=cut&&x.d<=p.d);
    return {x:new Date(p.d).getTime(),y:win.reduce((a,b)=>a+b.w,0)/win.length};
  });
}
function renderCharts(){
  // weigh page daily chart
  const wc=$("#wChart");
  if(wc&&S.weights.length>=2){
    const sorted=[...S.weights].sort((a,b)=>a.d<b.d?-1:1);
    const daily=sorted.map(p=>({x:new Date(p.d).getTime(),y:p.w}));
    drawLine(wc,[
      {points:daily,color:"#5c616b",width:1.5,dots:true},
      {points:trendSeries(sorted),color:"#caff3f",width:2.5,fill:"rgba(202,255,63,.14)"}
    ],{yfmt:v=>v.toFixed(0),xlabels:[fmtShort(sorted[0].d),fmtShort(sorted[sorted.length-1].d)]});
  }
  // progress page
  const pc=$("#pChart");
  if(pc){
    if(progChart==="weight"&&S.weights.length>=2){
      const sorted=[...S.weights].sort((a,b)=>a.d<b.d?-1:1);
      drawLine(pc,[
        {points:sorted.map(p=>({x:new Date(p.d).getTime(),y:p.w})),color:"#5c616b",width:1.5,dots:true},
        {points:trendSeries(sorted),color:"#caff3f",width:2.5,fill:"rgba(202,255,63,.14)"}
      ],{yfmt:v=>v.toFixed(0),xlabels:[fmtShort(sorted[0].d),fmtShort(sorted[sorted.length-1].d)]});
    } else if(progChart==="strength"&&S.workouts.length>=2){
      const pts=strengthTimeline();
      drawLine(pc,[{points:pts,color:"#caff3f",width:2.5,dots:true,fill:"rgba(202,255,63,.14)"}],
        {yfmt:v=>v.toFixed(2)+"×",xlabels:labelsFrom(pts)});
    } else if(progChart==="e1rm"&&S.workouts.length>=2){
      const pts=e1rmTimeline();
      drawLine(pc,[{points:pts,color:"#caff3f",width:2.5,dots:true,fill:"rgba(202,255,63,.14)"}],
        {yfmt:v=>v.toFixed(0),xlabels:labelsFrom(pts)});
    }
  }
}
function strengthTimeline(){ // cumulative best key-lift e1RM ÷ bw at each workout date
  const best={};const out=[];
  const sorted=[...S.workouts].sort((a,b)=>a.d<b.d?-1:1);
  sorted.forEach(w=>{
    w.ex.forEach(e=>{if(KEY_LIFTS.includes(e.name))e.sets.forEach(s=>{const v=e1rm(s.w,s.r);if(v>(best[e.name]||0))best[e.name]=v;});});
    const total=KEY_LIFTS.reduce((a,n)=>a+(best[n]||0),0);
    out.push({x:new Date(w.d).getTime(),y:total/bwOn(w.d),d:w.d});
  });
  return out;
}
function e1rmTimeline(){ // best key-lift e1RM achieved per session
  const sorted=[...S.workouts].sort((a,b)=>a.d<b.d?-1:1);
  return sorted.map(w=>{let best=0;w.ex.forEach(e=>{if(KEY_LIFTS.includes(e.name))e.sets.forEach(s=>{const v=e1rm(s.w,s.r);if(v>best)best=v;});});return{x:new Date(w.d).getTime(),y:best,d:w.d};}).filter(p=>p.y>0);
}
function labelsFrom(pts){return pts.length?[fmtShort(pts[0].d),fmtShort(pts[pts.length-1].d)]:["",""];}
function fmtShort(d){return new Date(d).toLocaleDateString(undefined,{month:"short",day:"numeric"});}

/* ============================ AFTER RENDER ============================ */
function afterRender(){
  updateTimerUI();
  requestAnimationFrame(renderCharts);
}

/* ============================ BOOT ============================ */
render();
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));
}
window.addEventListener("resize",()=>requestAnimationFrame(renderCharts));
// expose handlers used in inline onclick
Object.assign(window,{startWorkout,toggleEx,toggleDone,setVal,addSet,fillSuggested,cancelLog,completeWorkout,
  setTimer,toggleTimer,resetTimer,saveWeight,setProgChart,saveProfile,advanceRotation,exportData,importData,
  resetAll,doReset,finishOnboard,closeSheet});
</script>
